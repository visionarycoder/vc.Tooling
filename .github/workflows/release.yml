name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --no-restore --logger "console;verbosity=minimal"

    - name: Pack NuGet packages
      run: |
        dotnet pack src/vc.Architecture/vc.Architecture.csproj --configuration Release --output ./nupkg --no-build
        dotnet pack src/vc.Runtime/vc.Runtime.csproj --configuration Release --output ./nupkg --no-build
        dotnet pack src/vc.Ifx/vc.Ifx.csproj --configuration Release --output ./nupkg --no-build
        dotnet pack src/vc.Utility/vc.Utility.csproj --configuration Release --output ./nupkg --no-build
        dotnet pack src/vc.Tooling/vc.Tooling.csproj --configuration Release --output ./nupkg --no-build
        dotnet pack src/vc.Analyzers/vc.Analyzers.csproj --configuration Release --output ./nupkg --no-build
        dotnet pack src/vc.Generators/vc.Generators.csproj --configuration Release --output ./nupkg --no-build

    - name: Publish to NuGet.org
      run: |
        for package in ./nupkg/*.nupkg; do
          dotnet nuget push "$package" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        done
      if: github.event_name == 'workflow_dispatch'

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.event.inputs.version }}
        release_name: Release v${{ github.event.inputs.version }}
        body: |
          # VisionaryCoder.Tooling v${{ github.event.inputs.version }}

          ## What's New

          See [CHANGELOG.md](CHANGELOG.md) for detailed release notes.

          ## Packages

          - VisionaryCoder.Tooling.Architecture
          - VisionaryCoder.Tooling.Runtime
          - VisionaryCoder.Tooling.Ifx
          - VisionaryCoder.Tooling.Utility
          - VisionaryCoder.Tooling
          - VisionaryCoder.Tooling.Analyzers
          - VisionaryCoder.Tooling.Generators

          ## Installation

          ```bash
          dotnet add package VisionaryCoder.Tooling.Analyzers --version ${{ github.event.inputs.version }}
          ```

          ## Resources

          - [README](README.md)
          - [Documentation](docs/)
          - [Sample Project](samples/FullImplementation/)

        draft: false
        prerelease: false
      if: github.event_name == 'workflow_dispatch'

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: nupkg-${{ github.event.inputs.version }}
        path: ./nupkg/
        retention-days: 30
